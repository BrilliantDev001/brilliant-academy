    if (window.location.href.includes("account-success.html")) {
        alert("Your account has been successfully created!");
        // Redirect to login page after showing the alert
        window.location.href = "login.html";
    }

    const enrollButton = document.querySelector(".btn-primary");
    enrollButton.addEventListener("click", function(event) {
        event.preventDefault(); // Prevent form submission
        alert("Your account has been successfully created, you can now login to continue!");
        // Redirect to login page after showing the alert
        window.location.href = "login.html";
    });

    const loginLink = document.querySelector(".footer-text a");
    loginLink.addEventListener("click", function(event) {
        event.preventDefault(); // Prevent default link behavior
        window.location.href = "login.html"; // Redirect to login page
    });

    const inputFields = document.querySelectorAll(".input-group input");
    enrollButton.addEventListener("click", function(event) {
        event.preventDefault(); // Prevent form submission

        let allFieldsFilled = true;
        inputFields.forEach(function(input) {
            if (input.value.trim() === "") {
                allFieldsFilled = false;
            }
        });
    });
